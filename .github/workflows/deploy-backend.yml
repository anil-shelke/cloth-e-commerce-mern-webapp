name: Deploy Backend

on:
  push:
    branches:
      - cicddockerDeploy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd ~/cloth-e-commerce-mern-webapp/backend

            git pull origin cicddockerDeploy

            docker compose down

            docker compose up -d --build